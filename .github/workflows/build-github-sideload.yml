name: Build GitHub Sideload Package

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version from Package.appxmanifest
        required: true
        default: 1.7.1.0
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} Sideload Package
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x64
          - ARM64

    env:
      SIDELOAD_CERT_PASSWORD: ${{ secrets.SIDELOAD_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install 7-Zip-zstd And Stage 7za
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/mcmilk/7-Zip-zstd/releases/latest'
          $asset = $release.assets |
            Where-Object { $_.name -match '^7z.*-zstd-x64\.exe$' -and $_.name -notmatch '-ndm\.exe$' } |
            Select-Object -First 1

          if ($null -eq $asset) {
            throw 'Could not find a Windows x64 7-Zip-zstd installer asset in the latest GitHub release.'
          }

          $installerPath = Join-Path $env:RUNNER_TEMP $asset.name
          $installDirectory = Join-Path $env:RUNNER_TEMP '7zip-zstd'

          if (Test-Path -LiteralPath $installDirectory) {
            Remove-Item -LiteralPath $installDirectory -Recurse -Force
          }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installerPath

          # NSIS silent install. /D must be the final argument.
          $process = Start-Process -FilePath $installerPath -ArgumentList @('/S', "/D=$installDirectory") -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "7-Zip-zstd installer failed with exit code $($process.ExitCode)."
          }

          $sevenZip = Get-ChildItem -Path $installDirectory -Filter '7za.exe' -Recurse | Select-Object -First 1
          if ($null -eq $sevenZip) {
            throw "7za.exe was not found in the installed 7-Zip-zstd directory: $installDirectory"
          }

          Copy-Item -LiteralPath $sevenZip.FullName -Destination "$env:GITHUB_WORKSPACE\7za.exe" -Force

      - name: Validate Version Input
        shell: pwsh
        run: |
          if ('${{ inputs.package_version }}' -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "package_version must use a four-part version such as 1.6.1.0."
          }

      - name: Read Package Version
        id: version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content 'FolderRewind/Package.appxmanifest'
          $manifestVersion = $manifest.Package.Identity.Version
          if ($manifestVersion -ne '${{ inputs.package_version }}') {
            throw "The workflow input version does not match Package.appxmanifest."
          }

          $parts = $manifestVersion.Split('.')
          $tagVersion = '{0}.{1}.{2}' -f $parts[0], $parts[1], $parts[2]

          "manifest_version=$manifestVersion" >> $env:GITHUB_OUTPUT
          "release_tag=v$tagVersion" >> $env:GITHUB_OUTPUT

      - name: Decode Sideload Certificate
        id: certificate
        shell: pwsh
        env:
          SIDELOAD_CERT_BASE64: ${{ secrets.SIDELOAD_CERT_BASE64 }}
        run: |
          [xml]$manifest = Get-Content 'FolderRewind/Package.appxmanifest'

          .\.github\scripts\Decode-SideloadCertificate.ps1 `
            -Base64Certificate $env:SIDELOAD_CERT_BASE64 `
            -OutputDirectory "$env:RUNNER_TEMP\folderrewind-cert" `
            -OutputName "folderrewind-sideload.pfx" `
            -CertificatePassword $env:SIDELOAD_CERT_PASSWORD `
            -ExpectedPublisher $manifest.Package.Identity.Publisher

      - name: Import Sideload Certificate
        shell: pwsh
        run: |
          .\.github\scripts\Import-SideloadCertificate.ps1 `
            -CertificatePath "${{ steps.certificate.outputs.certificate_path }}" `
            -CertificatePassword $env:SIDELOAD_CERT_PASSWORD

      - name: Build MSIX Package
        shell: pwsh
        run: |
          dotnet build FolderRewind/FolderRewind.csproj `
            -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxBundle=Never `
            -p:GenerateAppxPackageOnBuild=true `
            -p:GenerateTestArtifacts=false `
            -p:AppxSymbolPackageEnabled=false `
            -p:GenerateAppxSymbolPackage=false `
            -p:DebugSymbols=false `
            -p:DebugType=None `
            -p:AppxPackageDir="$env:GITHUB_WORKSPACE\artifacts\appx\${{ matrix.platform }}\" `
            -p:PackageCertificateKeyFile= `
            -p:PackageCertificatePassword= `
            -p:PackageCertificateThumbprint=${{ steps.certificate.outputs.certificate_thumbprint }}

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          # Release the complete sideload install set instead of only the .msix file.
          .\.github\scripts\Prepare-SideloadPackage.ps1 `
            -PackageRoot "$env:GITHUB_WORKSPACE\artifacts\appx\${{ matrix.platform }}" `
            -Version "${{ steps.version.outputs.manifest_version }}" `
            -Platform "${{ matrix.platform }}" `
            -SevenZipPath "$env:GITHUB_WORKSPACE\7za.exe" `
            -OutputDirectory "$env:GITHUB_WORKSPACE\artifacts\release\${{ matrix.platform }}"

      - name: Upload Intermediate Assets
        uses: actions/upload-artifact@v4
        with:
          name: sideload-${{ matrix.platform }}
          path: artifacts/release/${{ matrix.platform }}/*

      - name: Remove Temporary Certificate
        if: always()
        shell: pwsh
        run: |
          .\.github\scripts\Remove-SideloadCertificate.ps1 `
            -CertificatePath "${{ steps.certificate.outputs.certificate_path }}" `
            -Thumbprint "${{ steps.certificate.outputs.certificate_thumbprint }}"

  publish-release:
    name: Publish GitHub Release Assets
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release Assets
        uses: actions/download-artifact@v4
        with:
          pattern: sideload-*
          path: artifacts/final
          merge-multiple: true

      - name: Read Package Version
        id: version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content 'FolderRewind/Package.appxmanifest'
          $manifestVersion = $manifest.Package.Identity.Version
          if ($manifestVersion -ne '${{ inputs.package_version }}') {
            throw "The workflow input version does not match Package.appxmanifest."
          }

          $parts = $manifestVersion.Split('.')
          $tagVersion = '{0}.{1}.{2}' -f $parts[0], $parts[1], $parts[2]

          "manifest_version=$manifestVersion" >> $env:GITHUB_OUTPUT
          "release_tag=v$tagVersion" >> $env:GITHUB_OUTPUT

      - name: Publish Assets To Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .\.github\scripts\Publish-ReleaseAssets.ps1 `
            -Tag "${{ steps.version.outputs.release_tag }}" `
            -ReleaseName "FolderRewind ${{ steps.version.outputs.manifest_version }}" `
            -TargetCommit "$env:GITHUB_SHA" `
            -AssetsDirectory "$env:GITHUB_WORKSPACE\artifacts\final"
